# SMTP Server configuratie
smtp.host=smtp.gmail.com
smtp.port=587
smtp.username=jouw.email@gmail.com
smtp.password=jouw-app-specifiek-wachtwoord

# Beveiligingsinstellingen
smtp.ssl=false
smtp.tls=true

# Timeout instellingen (in milliseconden)
smtp.connectiontimeout=5000
smtp.timeout=5000
smtp.writetimeout=5000

# Debug modus
smtp.debug=false

# Afzender informatie
mail.from.name=Hoevelaken Duurzaam Buurkracht
mail.from.email=info@uworganisatie.nl

# Batch instellingen
batch.delay=1000  # Wacht 1 seconde tussen e-mails
batch.max.retries=3
